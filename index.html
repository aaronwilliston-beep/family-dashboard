const b2a=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function keyFromPass(pw){
  const km=await crypto.subtle.importKey("raw",
    new TextEncoder().encode(pw),"PBKDF2",false,["deriveBits"]);
  return crypto.subtle.deriveBits(
    {name:"PBKDF2",salt:b2a(SALT),iterations:ITER,hash:"SHA-256"},km,256);
}
async function tryOpen(rawBits,remember){
  const key=await crypto.subtle.importKey("raw",rawBits,"AES-GCM",
    false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b2a(IV)},
    key,b2a(CT));               // throws on wrong key
  if(remember){try{localStorage.setItem("ffk",
    btoa(String.fromCharCode(...new Uint8Array(rawBits))));}catch(e){}}
  document.open();document.write(new TextDecoder().decode(pt));
  document.close();
}
document.getElementById("f").addEventListener("submit",async ev=>{
  ev.preventDefault();
  const err=document.getElementById("err");err.textContent="";
  try{
    const bits=await keyFromPass(document.getElementById("pw").value);
    await tryOpen(bits,document.getElementById("rm").checked);
  }catch(e){err.textContent="Wrong passphrase.";
    try{localStorage.removeItem("ffk");}catch(_){}}
});
(async()=>{                       // auto-unlock on a remembered device
  try{const k=localStorage.getItem("ffk");
    if(k)await tryOpen(b2a(k).buffer,false);
  }catch(e){try{localStorage.removeItem("ffk");}catch(_){}}
})();
