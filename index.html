<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-title" content="Finances">
<link rel="apple-touch-icon" href="icon.png">
<title>Family Finances</title>
<style>
:root{color-scheme:light dark}
body{margin:0;min-height:100vh;display:flex;align-items:center;
 justify-content:center;background:#f9f9f7;
 font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
 color:#0b0b0b}
@media (prefers-color-scheme:dark){body{background:#0d0d0d;color:#fff}
 .card{background:#1a1a19!important;border-color:#2c2c2a!important}
 input{background:#0d0d0d!important;color:#fff!important;
  border-color:#383835!important}}
.card{background:#fcfcfb;border:1px solid #e1e0d9;border-radius:16px;
 padding:28px 24px;width:min(90vw,340px);text-align:center}
h1{font-size:18px;margin:0 0 4px}
p{font-size:13px;color:#898781;margin:0 0 18px}
input{width:100%;box-sizing:border-box;font-size:17px;padding:11px 12px;
 border:1px solid #c3c2b7;border-radius:10px;margin-bottom:10px;
 background:#fff;color:#0b0b0b}
button{width:100%;font-size:16px;font-weight:600;padding:11px;border:0;
 border-radius:10px;background:#2a78d6;color:#fff}
label{display:flex;gap:8px;align-items:center;font-size:13.5px;
 color:#52514e;margin:4px 0 14px;justify-content:center}
.err{color:#d03b3b;font-size:13px;min-height:18px;margin-top:10px}
</style></head><body>
<form class="card" id="f">
 <h1>Family Finances</h1>
 <p>Enter the family passphrase</p>
 <input type="password" id="pw" autocomplete="current-password"
  placeholder="Passphrase">
 <label><input type="checkbox" id="rm" style="width:auto;margin:0" checked>
  Remember this device</label>
 <button type="submit">Unlock</button>
 <div class="err" id="err"></div>
</form>

async function keyFromPass(pw){
  const km=await crypto.subtle.importKey("raw",
    new TextEncoder().encode(pw),"PBKDF2",false,["deriveBits"]);
  return crypto.subtle.deriveBits(
    {name:"PBKDF2",salt:b2a(SALT),iterations:ITER,hash:"SHA-256"},km,256);
}
async function tryOpen(rawBits,remember){
  const key=await crypto.subtle.importKey("raw",rawBits,"AES-GCM",
    false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b2a(IV)},
    key,b2a(CT));               // throws on wrong key
  if(remember){try{localStorage.setItem("ffk",
    btoa(String.fromCharCode(...new Uint8Array(rawBits))));}catch(e){}}
  document.open();document.write(new TextDecoder().decode(pt));
  document.close();
}
